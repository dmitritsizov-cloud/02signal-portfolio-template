<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="page_title">Dmitri Tsizov — AI Automation Consulting</title>
  <meta name="description" content="Practical AI automation for Estonian businesses. n8n workflows, Telegram bots, data reporting." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #1A1B5C;
      --navy-deep: #0F1043;
      --purple-light: #6B5BD2;
      --purple-soft: #A89BE8;
      --purple-pale: #EDE9F8;
      --bg: #F5F5F5;
      --white: #FFFFFF;
      --text: #1A1B5C;
      --text-body: #2C2D3E;
      --text-muted: #6B6C7E;
      --border: #E2E2E8;
      --shadow-sm: 0 1px 2px rgba(26,27,92,0.06);
      --shadow-md: 0 4px 16px rgba(26,27,92,0.08);
      --shadow-lg: 0 12px 40px rgba(26,27,92,0.12);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text-body);
      line-height: 1.55;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ===== NAV ===== */
    .nav {
      background: var(--navy);
      color: var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 48px;
    }
    .logo {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.18em;
      flex-shrink: 0;
    }
    .logo-with-avatar {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: inherit;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .logo-with-avatar:hover { opacity: 0.85; }
    .logo-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--purple-pale);
      box-shadow: 0 2px 8px rgba(26, 27, 92, 0.12);
      transition: border-color 0.25s, transform 0.25s;
      flex-shrink: 0;
    }
    .logo-with-avatar:hover .logo-avatar {
      border-color: var(--purple-light);
      transform: scale(1.04);
    }
    .logo-text {
      font-size: 20px;
      letter-spacing: 0.18em;
      line-height: 1;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      flex: 1;
      justify-content: center;
      list-style: none;
    }
    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      padding: 6px 0;
      position: relative;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--purple-soft); }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -2px;
      height: 2px;
      background: var(--white);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-icon {
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      transition: opacity 0.2s;
      position: relative;
    }
    .nav-icon:hover { opacity: 0.7; }
    .nav-icon svg { width: 18px; height: 18px; }
    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--white);
      color: var(--text);
      border-radius: 6px;
      box-shadow: var(--shadow-lg);
      min-width: 140px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: all 0.2s;
      overflow: hidden;
    }
    .lang-dropdown.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .lang-option {
      padding: 11px 16px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s;
    }
    .lang-option:hover { background: var(--purple-pale); }
    .lang-option.current { background: var(--purple-pale); font-weight: 600; }
    .lang-flag { font-size: 16px; }
    .login-btn {
      background: var(--white);
      color: var(--navy);
      padding: 9px 18px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .login-btn:hover { background: var(--purple-pale); }

    /* ===== HERO ===== */
    .hero {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 32px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
    }
    .hero-image {
      position: relative;
      aspect-ratio: 16/10;
      background: linear-gradient(135deg, #2a2b6f 0%, #1A1B5C 50%, #0F1043 100%);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .hero-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(168,155,232,0.25) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(107,91,210,0.3) 0%, transparent 55%);
    }
    .hero-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: var(--white);
      z-index: 2;
    }
    .hero-avatar {
      position: absolute;
      bottom: 32px;
      right: 32px;
      width: 88px;
      height: 88px;
      overflow: hidden;
      z-index: 3;
    }
    .hero-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 22%;
      display: block;
      opacity: 0.25;
    }
    .hero-tag {
      font-size: 13px;
      letter-spacing: 0.04em;
      opacity: 0.85;
      margin-bottom: 12px;
    }
    .hero-title {
      font-family: var(--serif);
      font-size: 36px;
      line-height: 1.15;
      font-weight: 500;
      margin-bottom: 16px;
      max-width: 480px;
    }
    .hero-sub {
      font-size: 14px;
      line-height: 1.55;
      opacity: 0.85;
      max-width: 440px;
      margin-bottom: 24px;
    }
    .hero-buttons { display: flex; gap: 12px; }
    .btn {
      padding: 11px 22px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-block;
      font-family: var(--sans);
    }
    .btn-primary { background: var(--purple-light); color: var(--white); }
    .btn-primary:hover { background: #5a4bc2; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--white); border: 1.5px solid var(--white); }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }

    .hero-text { padding: 24px 0; }
    .hero-text h1 {
      font-family: var(--serif);
      font-size: 44px;
      line-height: 1.12;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 28px;
      max-width: 480px;
    }
    .hero-text p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-body);
      margin-bottom: 16px;
      max-width: 460px;
    }

    /* ===== SECTIONS ===== */
    section { padding: 80px 32px; }
    .section-inner { max-width: 1400px; margin: 0 auto; }
    .section-tag {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }
    .section-title {
      font-family: var(--serif);
      font-size: 42px;
      font-weight: 500;
      text-align: center;
      color: var(--text);
      margin-bottom: 18px;
      line-height: 1.15;
    }
    .section-intro {
      max-width: 620px;
      margin: 0 auto 56px;
      text-align: center;
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--text-body);
    }

    /* ===== SHEETS-STYLE TABS ===== */
    .sheets-section {
      background: var(--bg);
      padding: 90px 32px;
    }
    .sheets-section .section-tag,
    .sheets-section .section-title,
    .sheets-section .section-intro { text-align: left; }
    .sheets-section .section-intro { margin-left: 0; max-width: 640px; }

    .sheet {
      max-width: 1200px;
      margin: 36px auto 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .sheet-toolbar {
      background: #F8F9FA;
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Sans', monospace;
    }
    .sheet-toolbar .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #DADCE0;
    }
    .sheet-toolbar .dot:nth-child(1) { background: #EA4335; }
    .sheet-toolbar .dot:nth-child(2) { background: #FBBC04; }
    .sheet-toolbar .dot:nth-child(3) { background: #34A853; }
    .sheet-toolbar .filename {
      margin-left: 10px;
      color: var(--text);
      font-weight: 500;
    }

    .sheet-content {
      padding: 44px 48px 48px;
      min-height: 380px;
      position: relative;
      background-image:
        linear-gradient(rgba(26,27,92,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,27,92,0.025) 1px, transparent 1px);
      background-size: 140px 44px;
    }
    .sheet-cell {
      display: none;
      animation: cellIn 0.25s ease-out;
    }
    .sheet-cell.active { display: block; }
    @keyframes cellIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .sheet-ref {
      font-family: 'DM Sans', monospace;
      font-size: 11px;
      color: var(--purple-light);
      letter-spacing: 0.12em;
      margin-bottom: 14px;
      padding: 4px 10px;
      background: var(--purple-pale);
      display: inline-block;
      border-radius: 3px;
      font-weight: 600;
    }
    .sheet-cell h3 {
      font-family: var(--serif);
      font-size: 34px;
      color: var(--text);
      margin-bottom: 14px;
      font-weight: 500;
      line-height: 1.15;
      max-width: 720px;
    }
    .sheet-cell .lead {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-body);
      margin-bottom: 28px;
      max-width: 680px;
    }
    .sheet-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-top: 28px;
      max-width: 720px;
    }
    .sheet-metric {
      border-left: 3px solid var(--purple-light);
      padding: 4px 0 4px 16px;
    }
    .sheet-metric strong {
      font-family: var(--serif);
      font-size: 28px;
      color: var(--navy);
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      line-height: 1.1;
    }
    .sheet-metric span {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .sheet-tabs {
      background: #F1F3F4;
      border-top: 1px solid var(--border);
      padding: 0 10px;
      display: flex;
      align-items: stretch;
      gap: 1px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .sheet-tabs::-webkit-scrollbar { height: 4px; }
    .sheet-tabs::-webkit-scrollbar-thumb { background: #DADCE0; }

    .sheet-tab-nav {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 0 10px;
      cursor: pointer;
      font-size: 13px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .sheet-tab-nav:hover { color: var(--navy); }

    .sheet-tab {
      background: #E8EAED;
      border: none;
      padding: 11px 18px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 4px 4px 0 0;
      transition: background 0.15s, color 0.15s;
      position: relative;
      white-space: nowrap;
      border-right: 1px solid #DADCE0;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .sheet-tab:hover {
      background: #DADCE0;
      color: var(--text);
    }
    .sheet-tab.active {
      background: var(--white);
      color: var(--navy);
      font-weight: 600;
      margin-top: 0;
      padding-top: 15px;
    }
    .sheet-tab.active::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 3px;
      background: var(--purple-light);
      border-radius: 4px 4px 0 0;
    }

    .sheet-tab-add {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 0 14px;
      cursor: pointer;
      font-size: 18px;
      margin-left: 4px;
      font-weight: 300;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .sheet-tab-add:hover { color: var(--purple-light); }

    /* ===== CARDS 3-COLUMN ===== */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }
    .card {
      background: var(--white);
      border-radius: 4px;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .card-image {
      aspect-ratio: 16/10;
      position: relative;
      overflow: hidden;
    }
    .card-image-1 { background: linear-gradient(135deg, #6B5BD2 0%, #1A1B5C 100%); }
    .card-image-2 { background: linear-gradient(135deg, #A89BE8 0%, #6B5BD2 100%); }
    .card-image-3 { background: linear-gradient(135deg, #4A4B7F 0%, #2A2B5F 100%); }
    .card-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,0.1) 0%, transparent 40%);
    }
    .card-icon {
      position: absolute;
      bottom: 24px;
      left: 24px;
      color: var(--white);
      font-family: var(--serif);
      font-size: 28px;
      letter-spacing: 0.04em;
      z-index: 2;
    }
    .card-body { padding: 26px 26px 30px; }
    .card-body h3 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }
    .card-body p {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-body);
      margin-bottom: 20px;
      min-height: 84px;
    }
    .card-cta {
      display: inline-block;
      padding: 10px 18px;
      border: 1.5px solid var(--navy);
      color: var(--navy);
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .card-cta:hover { background: var(--navy); color: var(--white); }

    /* ===== TABLE / WEEKS ===== */
    .weeks-section { background: var(--white); }
    .weeks-list {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .week-row {
      background: var(--white);
      padding: 24px 32px;
      display: grid;
      grid-template-columns: 80px 1fr 220px 80px;
      gap: 24px;
      align-items: center;
      transition: background 0.15s;
    }
    .week-row:hover { background: var(--purple-pale); }
    .week-num {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--purple-light);
      font-weight: 600;
    }
    .week-content h4 {
      font-family: var(--serif);
      font-size: 19px;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .week-content p {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .week-meta {
      font-size: 12.5px;
      color: var(--text-muted);
    }
    .week-meta strong { color: var(--text); display: block; margin-bottom: 2px; font-weight: 600; }
    .level-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .level-shu { background: #E8F0FF; color: #2A4FBE; }
    .level-ha { background: #FFF4E0; color: #B4791E; }
    .level-haplus { background: var(--purple-pale); color: var(--purple-light); }
    .level-strategic { background: linear-gradient(135deg, var(--navy), var(--purple-light)); color: var(--white); }
    .level-demo { background: linear-gradient(135deg, #D4A340, #B4791E); color: var(--white); }
    .level-soon { background: #F0F0F0; color: var(--text-muted); }

    /* ===== DETAILED CASES ===== */
    .cases-section { background: var(--bg); }
    .case {
      background: var(--white);
      border-radius: 4px;
      padding: 40px 44px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
    }
    .case-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      gap: 24px;
      flex-wrap: wrap;
    }
    .case-header h3 {
      font-family: var(--serif);
      font-size: 26px;
      color: var(--text);
      font-weight: 600;
      flex: 1;
      min-width: 280px;
    }
    .case-body { font-size: 14px; line-height: 1.7; color: var(--text-body); }
    .case-body p { margin-bottom: 14px; }
    .case-body a { color: var(--purple-light); text-decoration: underline; text-underline-offset: 2px; }
    .case-body a:hover { color: var(--navy); }
    .case-body strong { color: var(--text); font-weight: 600; }
    .case-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 12px 24px;
      margin: 18px 0;
    }
    .case-grid dt { font-weight: 600; color: var(--text); font-size: 13.5px; }
    .case-grid dd { font-size: 13.5px; color: var(--text-body); }
    .case-body h4 {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin: 28px 0 14px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .case-body h4:first-of-type { margin-top: 24px; }
    .case-list {
      margin: 14px 0 18px;
      padding-left: 0;
      list-style: none;
    }
    .case-list li {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text-body);
      padding: 6px 0 6px 20px;
      position: relative;
    }
    .case-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--purple-light);
      font-weight: 600;
    }
    .case-list li + li { margin-top: 2px; }
    .case-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .case-link {
      padding: 8px 14px;
      background: var(--purple-pale);
      color: var(--navy);
      border-radius: 4px;
      font-size: 12.5px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .case-link:hover { background: var(--purple-light); color: var(--white); }

    /* ===== FOOTER ===== */
    footer {
      background: var(--navy-deep);
      color: rgba(255,255,255,0.85);
      padding: 60px 32px 30px;
    }
    .footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 40px;
    }
    .footer-brand h4 {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--white);
      margin-bottom: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }
    .footer-brand p { font-size: 13px; opacity: 0.8; max-width: 360px; line-height: 1.6; }
    .footer-col h5 {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--purple-soft);
      margin-bottom: 14px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 9px; }
    .footer-col a { font-size: 13px; opacity: 0.85; transition: opacity 0.2s; }
    .footer-col a:hover { opacity: 1; color: var(--purple-soft); }
    .footer-bottom {
      max-width: 1400px;
      margin: 0 auto;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      opacity: 0.65;
      text-align: center;
    }

    /* ===== TIMELINE SECTION (NEW) ===== */
    .timeline-section {
      background: linear-gradient(180deg, var(--bg) 0%, var(--white) 100%);
      padding: 80px 32px 60px;
    }
    .timeline-section .section-tag,
    .timeline-section .section-title,
    .timeline-section .section-intro { text-align: left; }
    .timeline-section .section-intro { margin-left: 0; max-width: 680px; }
    .timeline-wrap {
      max-width: 1280px;
      margin: 40px auto 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 36px 28px 28px;
      box-shadow: var(--shadow-md);
      position: relative;
    }
    .timeline-svg {
      width: 100%;
      height: auto;
      display: block;
      font-family: var(--sans);
    }
    .timeline-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .timeline-legend-item { display: flex; align-items: center; gap: 6px; }
    .timeline-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .timeline-mobile-list {
      display: none;
    }

    @media (max-width: 768px) {
      .timeline-section { padding: 60px 20px 40px; }
      .timeline-wrap { padding: 24px 16px; }
      .timeline-svg { display: none; }
      .timeline-mobile-list { display: block; }
      .timeline-mobile-list .tm-row {
        display: grid;
        grid-template-columns: 36px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid var(--border);
      }
      .timeline-mobile-list .tm-row:last-child { border-bottom: none; }
      .timeline-mobile-list .tm-num {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--purple-pale);
        color: var(--navy);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
      }
      .timeline-mobile-list .tm-num.done { background: var(--navy); color: var(--white); }
      .timeline-mobile-list .tm-content h5 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 2px;
      }
      .timeline-mobile-list .tm-content span {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.4;
      }
    }

    /* ===== RESPONSIVE (original) ===== */
    @media (max-width: 968px) {
      .nav-links { display: none; }
      .logo-text { display: none; }
      .logo-avatar { width: 38px; height: 38px; }
      .hero { grid-template-columns: 1fr; gap: 32px; padding: 24px 20px 0; }
      .hero-text h1 { font-size: 32px; }
      .hero-avatar { bottom: 20px; right: 20px; width: 72px; height: 72px; }
      .cards { grid-template-columns: 1fr; }
      .section-title { font-size: 30px; }
      section { padding: 56px 20px; }
      .week-row { grid-template-columns: 50px 1fr; gap: 14px; padding: 18px 20px; }
      .week-meta, .week-row .level-badge { grid-column: 2; }
      .case { padding: 26px 20px; }
      .case-grid { grid-template-columns: 1fr; gap: 4px; }
      .case-grid dt { margin-top: 10px; }
      .footer-inner { grid-template-columns: 1fr; gap: 32px; }
      .hero-title { font-size: 26px; }
      .hero-overlay { padding: 28px; }
      /* Sheets section mobile */
      .sheets-section { padding: 60px 20px; }
      .sheet-content { padding: 28px 22px 32px; min-height: 320px; }
      .sheet-cell h3 { font-size: 24px; }
      .sheet-cell .lead { font-size: 14px; }
      .sheet-metrics { grid-template-columns: 1fr; gap: 16px; }
      .sheet-metric strong { font-size: 22px; }
      .sheet-tab { padding: 10px 14px; font-size: 12px; }
    }

    /* ===== ABOUT ME SECTION (added) ===== */
    .aboutme-section {
      background: linear-gradient(180deg, var(--white) 0%, var(--bg) 100%);
      padding: 80px 32px 60px;
    }
    .aboutme-section .section-tag,
    .aboutme-section .section-title { text-align: left; margin-left: 0; }
    .aboutme-card {
      max-width: 1100px;
      margin: 40px auto 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      padding: 36px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 36px;
      align-items: start;
    }
    .aboutme-photo {
      width: 240px;
      height: 240px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid var(--purple-pale);
      box-shadow: 0 6px 24px rgba(26, 27, 92, 0.12);
      background: var(--purple-pale);
    }
    .aboutme-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .aboutme-name {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
      margin: 0 0 6px 0;
    }
    .aboutme-role {
      font-size: 15px;
      color: var(--text-muted);
      margin: 0 0 18px 0;
    }
    .aboutme-lead {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      margin: 0 0 24px 0;
    }
    .cert-card {
      background: linear-gradient(135deg, var(--purple-pale) 0%, #fff 100%);
      border: 1px solid var(--purple-light);
      border-left: 5px solid var(--purple-light);
      border-radius: 8px;
      padding: 20px 22px;
      margin: 0 0 22px 0;
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 18px;
      align-items: start;
    }
    .cert-icon {
      font-size: 40px;
      line-height: 1;
      margin-top: 2px;
    }
    .cert-program {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      margin: 0 0 4px 0;
    }
    .cert-period {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0 0 10px 0;
    }
    .cert-badge {
      display: inline-block;
      background: var(--purple-light);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .cert-desc {
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      margin: 0;
    }
    .aboutme-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .aboutme-links .btn { font-size: 14px; padding: 10px 20px; }
    .aboutme-meta {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    @media (max-width: 768px) {
      .aboutme-section { padding: 60px 20px 40px; }
      .aboutme-card { grid-template-columns: 1fr; padding: 24px; gap: 24px; }
      .aboutme-photo { width: 180px; height: 180px; margin: 0 auto; }
      .aboutme-name { font-size: 24px; text-align: center; }
      .aboutme-role { text-align: center; }
      .cert-card { grid-template-columns: 1fr; gap: 10px; text-align: center; }
      .cert-icon { text-align: center; }
    }

    /* ===== WEEK PRESENTATION VIDEO (collapsible) ===== */
    .week-presentation {
      margin: 0 0 24px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      background: #fff;
      transition: box-shadow 0.2s;
    }
    .week-presentation:hover { box-shadow: var(--shadow-md); }
    .week-presentation-header {
      padding: 13px 18px;
      background: linear-gradient(90deg, #F8F9FA, #fff);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .week-presentation-header:hover { background: #F0F2F5; }
    .week-presentation-header::before {
      content: '▶';
      font-size: 13px;
      color: var(--purple-light);
      transition: transform 0.25s;
    }
    .week-presentation.expanded .week-presentation-header::before { transform: rotate(90deg); }
    .week-presentation-header span { flex: 1; }
    .week-presentation-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease-out;
    }
    .week-presentation.expanded .week-presentation-content { max-height: 520px; }
    .week-presentation video { width: 100%; display: block; background: #000; }
    .week-presentation .video-wrapper { display: none; }
    html[lang="en"] .week-presentation .video-wrapper[data-lang="en"],
    html[lang="et"] .week-presentation .video-wrapper[data-lang="et"],
    html[lang="ru"] .week-presentation .video-wrapper[data-lang="ru"] { display: block; }
  </style>
</head>
